name: Sync upstream

on:
  schedule:
    - cron: "35 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Sync shuaiplus/nodewarden
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'nextwa/nodewarden' }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge upstream main
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/shuaiplus/nodewarden.git
          git fetch upstream main

          upstream_commits="$(git rev-list --count HEAD..upstream/main)"
          if [ "$upstream_commits" = "0" ]; then
            echo "Fork is already up to date with upstream/main."
            exit 0
          fi

          git merge --no-edit upstream/main
          git push origin HEAD:main
